# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.17.20260613"

package:
  name: types-pysftp
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/types-pysftp/types_pysftp-${{ version }}.tar.gz
  sha256: 29abc8091f96320ee3791ed013a13c88bb7332d2a644bf5abd208c0297d42c8b

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - types-paramiko

tests:
  - package_contents:
      site_packages:
        - pysftp-stubs/__init__.pyi
  - python:
      imports: []
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/python/typeshed
  summary: Typing stubs for pysftp
  license: Apache-2.0 AND MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fhoehle
    - conda-forge/mypy
